<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador - Máquina de Turing</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --error-color: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --tape-bg: #0b1120;
            --head-color: #eab308;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        main {
            width: 100%;
            max-width: 900px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        button {
            background: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 0 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: var(--border-color);
            cursor: not-allowed;
            color: var(--text-muted);
        }

        .status-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 1rem;
            background: var(--bg-color);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .status-item span {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.2rem;
        }

        .status-value {
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .accepted { color: var(--success-color); }
        .rejected { color: var(--error-color); }

        .tapes-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .tape-wrapper {
            background: var(--tape-bg);
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            position: relative;
        }

        .tape-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--surface-color);
            padding: 0 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .tape {
            display: flex;
            gap: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            padding-top: 10px;
        }

        .cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .cell.head {
            border-color: var(--head-color);
            background: rgba(234, 179, 8, 0.1);
            box-shadow: 0 0 10px rgba(234, 179, 8, 0.3);
            transform: translateY(-2px);
            font-weight: bold;
            color: var(--head-color);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .controls button {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .controls button:hover:not(:disabled) {
            background: var(--border-color);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            margin-top: 1rem;
            justify-content: center;
        }

        input[type="range"] {
            accent-color: var(--primary-color);
            width: 200px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loading {
            display: none;
            text-align: center;
            color: var(--primary-color);
            font-weight: 500;
            margin-top: 1rem;
        }

    </style>
</head>
<body>

    <header>
        <h1>Máquina de Turing Matemática</h1>
        <p class="subtitle">Simulador visual em tempo real (Base Unária)</p>
    </header>

    <main>
        <div class="input-group">
            <input type="text" id="equation" placeholder="Digite a equação (ex: 11*11=1111)" autocomplete="off">
            <button id="runBtn" onclick="runMachine()">Simular</button>
        </div>

        <div id="loading">Processando máquina de turing...</div>

        <div id="simulation-area" style="display: none;">
            <div class="status-container">
                <div class="status-item">
                    <span>Iteração</span>
                    <div class="status-value" id="iter-count">0 / 0</div>
                </div>
                <div class="status-item">
                    <span>Estado Atual</span>
                    <div class="status-value" id="current-state" style="color: var(--primary-color);">q0</div>
                </div>
                <div class="status-item">
                    <span>Resultado</span>
                    <div class="status-value" id="final-result">-</div>
                </div>
            </div>

            <div class="tapes-container">
                <div class="tape-wrapper">
                    <div class="tape-label">FITA 1</div>
                    <div class="tape" id="tape1"></div>
                </div>
                <div class="tape-wrapper">
                    <div class="tape-label">FITA 2</div>
                    <div class="tape" id="tape2"></div>
                </div>
            </div>

            <div class="slider-container">
                <label for="speed">Velocidade:</label>
                <input type="range" id="speed" min="10" max="1000" value="200" dir="rtl">
            </div>

            <div class="controls">
                <button id="btnPrev" onclick="step(-1)" disabled>&#9664; Passo Anterior</button>
                <button id="btnPlay" onclick="togglePlay()">Reproduzir</button>
                <button id="btnNext" onclick="step(1)" disabled>Próximo Passo &#9654;</button>
            </div>
        </div>
    </main>

    <script>
        let historyData = [];
        let currentIndex = 0;
        let isPlaying = false;
        let playInterval = null;

        async function runMachine() {
            const eqInput = document.getElementById('equation').value.trim();
            if (!eqInput) return;

            document.getElementById('runBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('simulation-area').style.display = 'none';
            document.getElementById('final-result').textContent = '-';
            document.getElementById('final-result').className = 'status-value';
            
            historyData = [];
            currentIndex = 0;

            try {
                // Simulação de transição e configuração sendo enviada do Front pro Back (Exemplo Base)
                // O Motor no Back só executará essas regras recebidas!
                const payload = {
                    "entrada": eqInput,
                    "configuracao": {
                        "simbolo_inicial": ">",
                        "simbolo_branco": "_",
                        "alfabeto_entrada": ["1", "+", "=", "*", "-", "/", "^"],
                        "alfabeto_auxiliar": ["1", "X", "Z"],
                        "estado_inicial": "q_dummy", 
                        "estado_aceitacao": "q_aceita",
                        "estado_rejeicao": "q_rejeita"
                    },
                    "transicoes": []
                };

                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Usando payload estático genérico só pra demonstrar requisição. 
                    // Obs: Como o backend não cria lógicas mais, enviando sem transições vai dar REJEIÇÃO imediata, a menos que o backend implemente mock.
                    body: JSON.stringify(payload) 
                });

                document.getElementById('simulation-area').style.display = 'block';
                document.getElementById('loading').style.display = 'none';

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    
                    // Manter a última parte que pode estar incompleta no buffer
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.trim() === '') continue;
                        const data = JSON.parse(line);
                        
                        if (data.erro) {
                            alert('Erro: ' + data.erro);
                            break;
                        }

                        historyData.push(data);
                        
                        // Desenhar imediatamente o passo ao vivo na tela
                        currentIndex = historyData.length - 1;
                        renderStep();

                        if (data.finalizado) {
                            const resultEl = document.getElementById('final-result');
                            if (data.aceito) {
                                resultEl.textContent = 'ACEITO';
                                resultEl.className = 'status-value accepted';
                            } else {
                                resultEl.textContent = 'REJEITADO';
                                resultEl.className = 'status-value rejected';
                            }
                        }
                        
                        // Aguardar baseado no slider para ditar a velocidade do streaming visualmente
                        const speed = document.getElementById('speed').value;
                        await new Promise(r => setTimeout(r, speed));
                    }
                }
            } catch (err) {
                alert('Erro de conexão com o servidor Flask Stream.');
            } finally {
                document.getElementById('runBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderTape(tapeString, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            // A string vem no formato: _11[1]1_
            // Vamos fazer parse manual.
            let i = 0;
            while (i < tapeString.length) {
                if (tapeString[i] === '[') {
                    // head element
                    i++; // skip [
                    let char = tapeString[i];
                    i++; // skip char
                    // skip ]
                    i++;
                    
                    const div = document.createElement('div');
                    div.className = 'cell head';
                    div.textContent = char;
                    container.appendChild(div);
                } else {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    div.textContent = tapeString[i];
                    container.appendChild(div);
                    i++;
                }
            }
        }

        function renderStep() {
            if (historyData.length === 0) return;

            const stepData = historyData[currentIndex];
            document.getElementById('iter-count').textContent = `${stepData.iteracao} / ${historyData.length - 1}`;
            document.getElementById('current-state').textContent = stepData.estado;

            renderTape(stepData.fita1, 'tape1');
            renderTape(stepData.fita2, 'tape2');

            document.getElementById('btnPrev').disabled = (currentIndex === 0);
            document.getElementById('btnNext').disabled = (currentIndex === historyData.length - 1);
            
            if (currentIndex === historyData.length - 1 && isPlaying) {
                togglePlay(); // stop automatically
            }
        }

        function step(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= historyData.length) currentIndex = historyData.length - 1;
            renderStep();
        }

        function togglePlay() {
            const btnPlay = document.getElementById('btnPlay');
            
            if (isPlaying) {
                clearInterval(playInterval);
                isPlaying = false;
                btnPlay.textContent = 'Reproduzir';
            } else {
                if (currentIndex === historyData.length - 1) {
                    currentIndex = 0; // restart if at the end
                }
                isPlaying = true;
                btnPlay.textContent = 'Pausar';
                
                const speed = document.getElementById('speed').value;
                playInterval = setInterval(() => {
                    step(1);
                }, speed);
            }
        }

        // Update speed dynamically
        document.getElementById('speed').addEventListener('input', function(e) {
            if (isPlaying) {
                clearInterval(playInterval);
                playInterval = setInterval(() => {
                    step(1);
                }, e.target.value);
            }
        });

    </script>
</body>
</html>
