<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador - Máquina de Turing</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --error-color: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --tape-bg: #0b1120;
            --head-color: #eab308;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        main {
            width: 100%;
            max-width: 900px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        button {
            background: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 0 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: var(--border-color);
            cursor: not-allowed;
            color: var(--text-muted);
        }

        .status-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 1rem;
            background: var(--bg-color);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .status-item span {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.2rem;
        }

        .status-value {
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .accepted { color: var(--success-color); }
        .rejected { color: var(--error-color); }

        .tapes-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .tape-wrapper {
            background: var(--tape-bg);
            border-radius: 8px;
            padding: 1.25rem 1rem;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.75rem;
            min-height: 108px;
        }

        .tape-label {
            align-self: flex-start;
            background: var(--surface-color);
            padding: 0 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .tape {
            display: flex;
            gap: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            min-height: 56px;
            align-items: center;
        }

        .cell {
            width: 40px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .cell.head {
            border-color: var(--head-color);
            background: rgba(234, 179, 8, 0.1);
            box-shadow: 0 0 10px rgba(234, 179, 8, 0.3);
            transform: translateY(-2px);
            font-weight: bold;
            color: var(--head-color);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .controls button {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .controls button:hover:not(:disabled) {
            background: var(--border-color);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            margin-top: 1rem;
            justify-content: center;
        }

        input[type="range"] {
            accent-color: var(--primary-color);
            width: 200px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loading {
            display: none;
            text-align: center;
            color: var(--primary-color);
            font-weight: 500;
            margin-top: 1rem;
        }

    </style>
</head>
<body>

    <header>
        <h1>Máquina de Turing Com Duas Fitas</h1>
        <p class="subtitle">INF05035 - Teoria Da Computação</p>
        <p class="subtitle">Milton Pacheco - 590535</p>
        <p class="subtitle">Pedro Gasparetto - 581161</p>
    </header>

    <main>
        <div class="input-group">
            <input type="text" id="equation" placeholder="Digite a equação (ex: 11*11=1111)" autocomplete="off">
            <button id="runBtn" onclick="runMachine()">Simular</button>
        </div>

        <div id="loading">Processando máquina de turing...</div>

        <div id="simulation-area" style="display: none;">
            <div class="status-container">
                <div class="status-item">
                    <span>Iteração</span>
                    <div class="status-value" id="iter-count">0 / 0</div>
                </div>
                <div class="status-item">
                    <span>Estado Atual</span>
                    <div class="status-value" id="current-state" style="color: var(--primary-color);">q0</div>
                </div>
                <div class="status-item">
                    <span>Resultado</span>
                    <div class="status-value" id="final-result">-</div>
                </div>
            </div>

            <div class="tapes-container">
                <div class="tape-wrapper">
                    <div class="tape-label">FITA 1</div>
                    <div class="tape" id="tape1"></div>
                </div>
                <div class="tape-wrapper">
                    <div class="tape-label">FITA 2</div>
                    <div class="tape" id="tape2"></div>
                </div>
            </div>

            <div class="slider-container">
                <label for="speed">Velocidade:</label>
                <input type="range" id="speed" min="10" max="1000" value="200" dir="rtl">
            </div>

            <div class="controls">
                <button id="btnPrev" onclick="step(-1)" disabled>&#9664; Passo Anterior</button>
                <button id="btnPlay" onclick="togglePlay()">Reproduzir</button>
                <button id="btnNext" onclick="step(1)" disabled>Próximo Passo &#9654;</button>
            </div>
        </div>
    </main>

    <script>
        let historyData = [];
        let currentIndex = 0;
        let isPlaying = false;
        let playInterval = null;

        function buildTransition(estadoOrigem, simbolosLidos, simbolosEscritos, direcoes, estadoDestino) {
            return {
                estado_origem: estadoOrigem,
                simbolos_lidos: simbolosLidos,
                simbolos_escritos: simbolosEscritos,
                direcoes,
                estado_destino: estadoDestino
            };
        }

        function createSumMachine() {
            return {
                configuracao: {
                    simbolo_inicial: '>',
                    simbolo_branco: '_',
                    alfabeto_entrada: ['1', '+', '='],
                    alfabeto_auxiliar: ['1'],
                    estado_inicial: 'q0',
                    estado_aceitacao: 'q_aceita',
                    estado_rejeicao: 'q_rejeita'
                },
                transicoes: [
                    buildTransition('q0', ['>', '>'], ['>', '>'], ['D', 'D'], 'q_read_x'),
                    buildTransition('q_read_x', ['1', '_'], ['1', '1'], ['D', 'D'], 'q_read_x'),
                    buildTransition('q_read_x', ['+', '_'], ['+', '_'], ['D', 'P'], 'q_read_y'),
                    buildTransition('q_read_y', ['1', '_'], ['1', '1'], ['D', 'D'], 'q_read_y'),
                    buildTransition('q_read_y', ['=', '_'], ['=', '_'], ['D', 'E'], 'q_rewind'),
                    buildTransition('q_rewind', ['1', '1'], ['1', '1'], ['P', 'E'], 'q_rewind'),
                    buildTransition('q_rewind', ['_', '1'], ['_', '1'], ['P', 'E'], 'q_rewind'),
                    buildTransition('q_rewind', ['1', '>'], ['1', '>'], ['P', 'D'], 'q_compare'),
                    buildTransition('q_rewind', ['_', '>'], ['_', '>'], ['P', 'D'], 'q_compare'),
                    buildTransition('q_compare', ['1', '1'], ['1', '1'], ['D', 'D'], 'q_compare'),
                    buildTransition('q_compare', ['_', '_'], ['_', '_'], ['P', 'P'], 'q_aceita')
                ]
            };
        }

        function createSubtractionMachine() {
            return {
                configuracao: {
                    simbolo_inicial: '>',
                    simbolo_branco: '_',
                    alfabeto_entrada: ['1', '-', '='],
                    alfabeto_auxiliar: ['1'],
                    estado_inicial: 'q0',
                    estado_aceitacao: 'q_aceita',
                    estado_rejeicao: 'q_rejeita'
                },
                transicoes: [
                    buildTransition('q0', ['>', '>'], ['>', '>'], ['D', 'D'], 'q_read_x'),
                    buildTransition('q_read_x', ['1', '_'], ['1', '1'], ['D', 'D'], 'q_read_x'),
                    buildTransition('q_read_x', ['-', '_'], ['-', '_'], ['P', 'E'], 'q_rewind_x'),
                    buildTransition('q_rewind_x', ['-', '1'], ['-', '1'], ['P', 'E'], 'q_rewind_x'),
                    buildTransition('q_rewind_x', ['-', '>'], ['-', '>'], ['D', 'D'], 'q_read_y'),
                    buildTransition('q_read_y', ['1', '1'], ['1', '1'], ['D', 'D'], 'q_read_y'),
                    buildTransition('q_read_y', ['=', '1'], ['=', '1'], ['D', 'P'], 'q_compare'),
                    buildTransition('q_read_y', ['=', '_'], ['=', '_'], ['D', 'P'], 'q_compare'),
                    buildTransition('q_compare', ['1', '1'], ['1', '1'], ['D', 'D'], 'q_compare'),
                    buildTransition('q_compare', ['_', '_'], ['_', '_'], ['P', 'P'], 'q_aceita')
                ]
            };
        }

        function createMultiplicationMachine() {
            return {
                configuracao: {
                    simbolo_inicial: '>',
                    simbolo_branco: '_',
                    alfabeto_entrada: ['1', '*', '='],
                    alfabeto_auxiliar: ['1', 'X', 'Z'],
                    estado_inicial: 'q0',
                    estado_aceitacao: 'q_aceita',
                    estado_rejeicao: 'q_rejeita'
                },
                transicoes: [
                    buildTransition('q0', ['>', '>'], ['>', '>'], ['D', 'D'], 'q_read_x'),
                    buildTransition('q_read_x', ['1', '_'], ['1', '1'], ['D', 'D'], 'q_read_x'),
                    buildTransition('q_read_x', ['*', '_'], ['*', '_'], ['P', 'E'], 'q_rewind_x'),
                    buildTransition('q_rewind_x', ['*', '>'], ['*', '>'], ['D', 'D'], 'q_y_loop'),
                    buildTransition('q_rewind_x', ['*', '1'], ['*', '1'], ['P', 'E'], 'q_rewind_x'),
                    buildTransition('q_y_loop', ['1', '1'], ['X', '1'], ['D', 'P'], 'q_goto_z'),
                    buildTransition('q_y_loop', ['1', '_'], ['X', '_'], ['D', 'P'], 'q_goto_z'),
                    buildTransition('q_y_loop', ['=', '1'], ['=', '1'], ['D', 'P'], 'q_check_z_end'),
                    buildTransition('q_y_loop', ['=', '_'], ['=', '_'], ['D', 'P'], 'q_check_z_end'),
                    buildTransition('q_goto_z', ['1', '1'], ['1', '1'], ['D', 'P'], 'q_goto_z'),
                    buildTransition('q_goto_z', ['1', '_'], ['1', '_'], ['D', 'P'], 'q_goto_z'),
                    buildTransition('q_goto_z', ['=', '1'], ['=', '1'], ['D', 'P'], 'q_at_z'),
                    buildTransition('q_goto_z', ['=', '_'], ['=', '_'], ['D', 'P'], 'q_at_z'),
                    buildTransition('q_at_z', ['Z', '1'], ['Z', '1'], ['D', 'P'], 'q_at_z'),
                    buildTransition('q_at_z', ['Z', '_'], ['Z', '_'], ['D', 'P'], 'q_at_z'),
                    buildTransition('q_at_z', ['1', '1'], ['Z', '1'], ['D', 'D'], 'q_match_z'),
                    buildTransition('q_at_z', ['1', '_'], ['1', '_'], ['P', 'P'], 'q_rewind_both'),
                    buildTransition('q_at_z', ['_', '_'], ['_', '_'], ['P', 'P'], 'q_rewind_both'),
                    buildTransition('q_match_z', ['1', '1'], ['Z', '1'], ['D', 'D'], 'q_match_z'),
                    buildTransition('q_match_z', ['1', '_'], ['1', '_'], ['P', 'E'], 'q_rewind_both'),
                    buildTransition('q_match_z', ['_', '_'], ['_', '_'], ['P', 'E'], 'q_rewind_both'),
                    buildTransition('q_rewind_both', ['1', '1'], ['1', '1'], ['E', 'E'], 'q_rewind_both'),
                    buildTransition('q_rewind_both', ['Z', '1'], ['Z', '1'], ['E', 'E'], 'q_rewind_both'),
                    buildTransition('q_rewind_both', ['=', '1'], ['=', '1'], ['E', 'E'], 'q_rewind_both'),
                    buildTransition('q_rewind_both', ['_', '1'], ['_', '1'], ['E', 'E'], 'q_rewind_both'),
                    buildTransition('q_rewind_both', ['1', '>'], ['1', '>'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_both', ['Z', '>'], ['Z', '>'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_both', ['=', '>'], ['=', '>'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_both', ['_', '>'], ['_', '>'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_both', ['1', '_'], ['1', '_'], ['E', 'E'], 'q_rewind_both'),
                    buildTransition('q_rewind_both', ['Z', '_'], ['Z', '_'], ['E', 'E'], 'q_rewind_both'),
                    buildTransition('q_rewind_both', ['=', '_'], ['=', '_'], ['E', 'E'], 'q_rewind_both'),
                    buildTransition('q_rewind_both', ['_', '_'], ['_', '_'], ['E', 'E'], 'q_rewind_both'),
                    buildTransition('q_rewind_f1_only', ['1', '>'], ['1', '>'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_f1_only', ['Z', '>'], ['Z', '>'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_f1_only', ['=', '>'], ['=', '>'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_f1_only', ['_', '>'], ['_', '>'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_f1_only', ['1', '_'], ['1', '_'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_f1_only', ['Z', '_'], ['Z', '_'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_f1_only', ['=', '_'], ['=', '_'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_f1_only', ['_', '_'], ['_', '_'], ['E', 'P'], 'q_rewind_f1_only'),
                    buildTransition('q_rewind_f1_only', ['X', '>'], ['X', '>'], ['D', 'D'], 'q_y_loop'),
                    buildTransition('q_rewind_f1_only', ['*', '>'], ['*', '>'], ['D', 'D'], 'q_y_loop'),
                    buildTransition('q_rewind_f1_only', ['X', '_'], ['X', '_'], ['D', 'P'], 'q_y_loop'),
                    buildTransition('q_rewind_f1_only', ['*', '_'], ['*', '_'], ['D', 'P'], 'q_y_loop'),
                    buildTransition('q_check_z_end', ['Z', '1'], ['Z', '1'], ['D', 'P'], 'q_check_z_end'),
                    buildTransition('q_check_z_end', ['Z', '_'], ['Z', '_'], ['D', 'P'], 'q_check_z_end'),
                    buildTransition('q_check_z_end', ['_', '1'], ['_', '1'], ['P', 'P'], 'q_aceita'),
                    buildTransition('q_check_z_end', ['_', '_'], ['_', '_'], ['P', 'P'], 'q_aceita')
                ]
            };
        }

        function createSpecificDfaMachine(entrada) {
            const transicoes = [
                buildTransition('q0', ['>', '>'], ['>', '>'], ['D', 'P'], 'q_start')
            ];
            const trie = {};
            let estadoId = 1;

            let node = trie;
            for (const char of entrada) {
                if (!node[char]) {
                    node[char] = { _id: `q_dfa_${estadoId}` };
                    estadoId += 1;
                }
                node = node[char];
            }
            node._aceita = true;

            function buildTransitions(currNode, currState) {
                for (const [char, child] of Object.entries(currNode)) {
                    if (char.startsWith('_')) continue;
                    const nextState = child._id;
                    transicoes.push(buildTransition(currState, [char, '>'], [char, '>'], ['D', 'P'], nextState));
                    buildTransitions(child, nextState);
                    if (child._aceita) {
                        transicoes.push(buildTransition(nextState, ['_', '>'], ['_', '>'], ['P', 'P'], 'q_aceita'));
                    }
                }
            }

            buildTransitions(trie, 'q_start');

            return {
                configuracao: {
                    simbolo_inicial: '>',
                    simbolo_branco: '_',
                    alfabeto_entrada: ['1', '/', '^', '='],
                    alfabeto_auxiliar: [],
                    estado_inicial: 'q0',
                    estado_aceitacao: 'q_aceita',
                    estado_rejeicao: 'q_rejeita'
                },
                transicoes
            };
        }

        function buildPayload(eqInput) {
            let machineDefinition = null;

            if (eqInput.includes('+')) {
                machineDefinition = createSumMachine();
            } else if (eqInput.includes('-')) {
                machineDefinition = createSubtractionMachine();
            } else if (eqInput.includes('*')) {
                machineDefinition = createMultiplicationMachine();
            } else if (eqInput.includes('/') || eqInput.includes('^')) {
                machineDefinition = createSpecificDfaMachine(eqInput);
            } else {
                throw new Error('Operador não reconhecido. Use +, -, *, / ou ^.');
            }

            return {
                entrada: eqInput,
                espera_ms: 0,
                configuracao: machineDefinition.configuracao,
                transicoes: machineDefinition.transicoes
            };
        }

        async function runMachine() {
            const eqInput = document.getElementById('equation').value.trim();
            if (!eqInput) return;

            document.getElementById('runBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('simulation-area').style.display = 'none';
            document.getElementById('final-result').textContent = '-';
            document.getElementById('final-result').className = 'status-value';
            
            historyData = [];
            currentIndex = 0;

            try {
                const payload = buildPayload(eqInput);

                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });

                if (!response.ok) {
                    let errorMessage = 'Erro ao executar a máquina.';
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.erro || errorData.error || errorMessage;
                    } catch (_) {
                        try {
                            const errorText = await response.text();
                            if (errorText.trim()) {
                                errorMessage = errorText.trim();
                            }
                        } catch (_) {}
                    }
                    throw new Error(errorMessage);
                }

                if (!response.body) {
                    throw new Error('O servidor não retornou um stream de execução.');
                }

                document.getElementById('simulation-area').style.display = 'block';
                document.getElementById('loading').style.display = 'none';

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    
                    // Manter a última parte que pode estar incompleta no buffer
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.trim() === '') continue;
                        const data = JSON.parse(line);
                        
                        if (data.erro) {
                            alert('Erro: ' + data.erro);
                            break;
                        }

                        historyData.push(data);
                        
                        // Desenhar imediatamente o passo ao vivo na tela
                        currentIndex = historyData.length - 1;
                        renderStep();

                        if (data.finalizado) {
                            const resultEl = document.getElementById('final-result');
                            if (data.aceito) {
                                resultEl.textContent = 'ACEITO';
                                resultEl.className = 'status-value accepted';
                            } else {
                                resultEl.textContent = 'REJEITADO';
                                resultEl.className = 'status-value rejected';
                            }
                        }
                        
                        // Aguardar baseado no slider para ditar a velocidade do streaming visualmente
                        const speed = document.getElementById('speed').value;
                        await new Promise(r => setTimeout(r, speed));
                    }
                }
            } catch (err) {
                alert(err.message || 'Erro de conexão com o servidor Flask Stream.');
            } finally {
                document.getElementById('runBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderTape(tapeString, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            // A string vem no formato: _11[1]1_
            // Vamos fazer parse manual.
            let i = 0;
            while (i < tapeString.length) {
                if (tapeString[i] === '[') {
                    // head element
                    i++; // skip [
                    let char = tapeString[i];
                    i++; // skip char
                    // skip ]
                    i++;
                    
                    const div = document.createElement('div');
                    div.className = 'cell head';
                    div.textContent = char;
                    container.appendChild(div);
                } else {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    div.textContent = tapeString[i];
                    container.appendChild(div);
                    i++;
                }
            }
        }

        function renderStep() {
            if (historyData.length === 0) return;

            const stepData = historyData[currentIndex];
            document.getElementById('iter-count').textContent = `${stepData.iteracao} / ${historyData.length - 1}`;
            document.getElementById('current-state').textContent = stepData.estado;

            renderTape(stepData.fita1, 'tape1');
            renderTape(stepData.fita2, 'tape2');

            document.getElementById('btnPrev').disabled = (currentIndex === 0);
            document.getElementById('btnNext').disabled = (currentIndex === historyData.length - 1);
            
            if (currentIndex === historyData.length - 1 && isPlaying) {
                togglePlay(); // stop automatically
            }
        }

        function step(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= historyData.length) currentIndex = historyData.length - 1;
            renderStep();
        }

        function togglePlay() {
            const btnPlay = document.getElementById('btnPlay');
            
            if (isPlaying) {
                clearInterval(playInterval);
                isPlaying = false;
                btnPlay.textContent = 'Reproduzir';
            } else {
                if (currentIndex === historyData.length - 1) {
                    currentIndex = 0; // restart if at the end
                }
                isPlaying = true;
                btnPlay.textContent = 'Pausar';
                
                const speed = document.getElementById('speed').value;
                playInterval = setInterval(() => {
                    step(1);
                }, speed);
            }
        }

        // Update speed dynamically
        document.getElementById('speed').addEventListener('input', function(e) {
            if (isPlaying) {
                clearInterval(playInterval);
                playInterval = setInterval(() => {
                    step(1);
                }, e.target.value);
            }
        });

    </script>
</body>
</html>
